name: Generate GitHub Contribution Animation

on:
  # Run automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  
  # Allow manual runs
  workflow_dispatch:
  
  # Run on every push to the main branch
  push:
    branches:
      - main
    
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      # Generate SVG animations of GitHub contributions graph
      - name: Generate SVG Animation
        id: generate
        uses: Platane/snk/svg-only@v2
        with:
          github_user_name: ajin597

      - name: Save generated SVG files
        run: |
          mkdir -p dist
          mv github-contribution-grid-snake.svg dist/
          mv "github-contribution-grid-snake-dark.svg?palette=github-dark" dist/

      # Push generated SVG files to a specific branch
      - name: Push to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v2.6.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
